name: medialert
description: Smart Medicine Reminder App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  firebase_core: ^3.8.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  # firebase_storage সরানো হয়েছে

  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  intl: ^0.19.0
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  uuid: ^4.5.1

  file_picker: ^8.1.2
  image_picker: ^1.0.7
  image_picker_web: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/mediAlert_logo.png
    - assets/background.png